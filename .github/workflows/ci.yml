name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (xmake + gtest)
    runs-on: [self-hosted, linux]
    env:
      # myoung34/github-runner containers run as root; xmake refuses unless told.
      XMAKE_ROOT: y
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          # Self-hosted myoung34/github-runner runs as root; no sudo needed
          set -e
          cat /etc/os-release | head -2
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            software-properties-common build-essential git curl unzip zip pkg-config \
            libreadline-dev python3-pip
          # Ensure universe (jammy) and toolchain PPA — guarantees g++-12 availability.
          add-apt-repository -y universe || true
          add-apt-repository -y ppa:ubuntu-toolchain-r/test || true
          apt-get update
          # Install newest g++ we can get; fall through versions.
          GPP=""
          for v in 14 13 12; do
            if DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends g++-$v gcc-$v; then
              GPP=$v; break
            fi
          done
          if [[ -z "$GPP" ]]; then echo "no modern g++ available" >&2; exit 1; fi
          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-$GPP 100
          update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-$GPP 100
          pip install pyyaml
          g++ --version | head -1

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake
            build/.packages
          key: xmake-linux-${{ hashFiles('xmake.lua') }}
          restore-keys: xmake-linux-

      - name: Configure
        run: xmake f -y -m releasedbg

      - name: Build
        run: xmake build -y

      - name: Run tests
        run: xmake test -v

  extension:
    name: VS Code extension (.vsix)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Verify version matches xmake.lua
        run: |
          xmake_version=$(grep -oP 'set_version\("\K[^"]+' xmake.lua)
          pkg_version=$(node -p "require('./editors/vscode/package.json').version")
          echo "xmake.lua version:    $xmake_version"
          echo "package.json version: $pkg_version"
          if [ "$xmake_version" != "$pkg_version" ]; then
            echo "::error::xmake.lua and editors/vscode/package.json version mismatch"
            exit 1
          fi

      - name: Compile TypeScript
        working-directory: editors/vscode
        run: npm run compile

      - name: Run grammar tests
        working-directory: editors/vscode
        run: npm run test:grammar

      - name: Package .vsix
        working-directory: editors/vscode
        run: npm run package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: mora-vscode-vsix
          path: editors/vscode/mora-vscode-*.vsix
          if-no-files-found: error

  windows:
    name: Windows (MSVC — SKSE runtime DLL)
    runs-on: [self-hosted, windows]
    needs: extension
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pyyaml

      - name: Fetch spdlog and fmt headers (replace Linux-only symlinks)
        run: |
          $ErrorActionPreference = 'Stop'
          # extern/spdlog-shim/{spdlog,fmt} are symlinks to /usr/include/* on
          # Linux dev boxes. On Windows checkout they materialize as text files
          # containing the target path. Replace them with real headers.
          $shim = "$PWD/extern/spdlog-shim"
          foreach ($name in @('spdlog','fmt')) {
            $path = "$shim/$name"
            if (Test-Path $path -PathType Leaf) { Remove-Item -Force $path }
            elseif (Test-Path $path) { Remove-Item -Recurse -Force $path }
          }
          # Versions must match the Linux dev setup
          # (/usr/include/spdlog = 1.17, /usr/include/fmt = 12.x), and spdlog
          # must be driven in SPDLOG_FMT_EXTERNAL mode (see build flags below)
          # so it uses our standalone fmt rather than its bundled copy.
          git clone --depth 1 --branch v1.17.0 https://github.com/gabime/spdlog.git "$shim/spdlog-src"
          git clone --depth 1 --branch 12.0.0  https://github.com/fmtlib/fmt.git    "$shim/fmt-src"
          Move-Item "$shim/spdlog-src/include/spdlog" "$shim/spdlog"
          Move-Item "$shim/fmt-src/include/fmt"       "$shim/fmt"
          Remove-Item -Recurse -Force "$shim/spdlog-src","$shim/fmt-src"

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache CommonLibSSE-NG objects
        uses: actions/cache@v4
        with:
          path: build/commonlib
          key: commonlib-v2-${{ runner.os }}-${{ hashFiles('extern/CommonLibSSE-NG/**/*.cpp', 'extern/CommonLibSSE-NG/**/*.h') }}
          restore-keys: commonlib-v2-${{ runner.os }}-

      - name: Build CommonLibSSE-NG static lib (ninja)
        run: |
          $ErrorActionPreference = 'Stop'
          $proj = $PWD.Path -replace '\\','/'
          $commonlib = "$proj/extern/CommonLibSSE-NG"
          $buildDir = "$proj/build/commonlib"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null

          # Shared flags (compile-only; no /Fo).
          $flags = "/nologo /std:c++latest /O2 /EHsc /utf-8 /MD /Zc:preprocessor " +
                   "/DWIN32 /D_WIN32 /DNOMINMAX /DSPDLOG_COMPILED_LIB /DSPDLOG_FMT_EXTERNAL " +
                   "/DENABLE_SKYRIM_SE=1 /DENABLE_SKYRIM_AE=1 " +
                   "/I`"$commonlib/include`" /I`"$proj/extern/spdlog-shim`" " +
                   "/I`"$proj/extern/simplemath-shim`" " +
                   "/FISKSE/Impl/PCH.h /w"

          $sources = Get-ChildItem -Path "$commonlib/src" -Recurse -Filter *.cpp
          Write-Host "Generating ninja build for $($sources.Count) CommonLibSSE source files..."

          $ninja = [System.Collections.Generic.List[string]]::new()
          $ninja.Add("ninja_required_version = 1.8")
          $ninja.Add("rule cxx")
          $ninja.Add("  command = cl.exe $flags /c /Fo`$out `$in")
          $ninja.Add("  description = CXX `$out")
          $ninja.Add("  deps = msvc")

          # Ninja uses ':' as the output/rule separator, so drive-letter
          # paths like 'D:/...' must escape the colon as '$:'.
          function Esc-Ninja([string]$p) { $p -replace ':','$:' }

          $objFiles = [System.Collections.Generic.List[string]]::new()
          $prefix = ("$commonlib/src/").Replace('/','\')
          foreach ($s in $sources) {
            $rel = $s.FullName.Substring($prefix.Length)
            $objName = (($rel -replace '[\\/]','_') -replace '\.cpp$','.obj')
            $obj = "$buildDir/$objName"
            $objFiles.Add($obj)
            $srcN = $s.FullName -replace '\\','/'
            $ninja.Add("build $(Esc-Ninja $obj): cxx $(Esc-Ninja $srcN)")
          }
          Set-Content -Path "$buildDir/build.ninja" -Value $ninja -Encoding ascii

          & ninja -f "$buildDir/build.ninja"
          if ($LASTEXITCODE -ne 0) { throw "ninja failed" }

          $existing = $objFiles | Where-Object { Test-Path $_ }
          Write-Host "Compiled $($existing.Count)/$($sources.Count) object files"

          # Response file — too many args for the command line otherwise.
          $rsp = "$buildDir/lib.rsp"
          Set-Content -Path $rsp -Value ($existing -join "`n") -Encoding ascii
          & lib.exe /nologo "/out:$commonlib/CommonLibSSE.lib" "@$rsp"
          if ($LASTEXITCODE -ne 0) { throw "lib.exe failed" }
          Write-Host "Produced $commonlib/CommonLibSSE.lib"

      - name: Build mora_rt.lib
        run: |
          $ErrorActionPreference = 'Stop'
          $proj = $PWD.Path
          $buildDir = "$proj/build/rt"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          New-Item -ItemType Directory -Force -Path "$proj/data" | Out-Null

          $flags = @(
            '/nologo','/std:c++latest','/O2','/EHsc','/utf-8','/MD',
            '/Zc:preprocessor',
            '/DWIN32','/D_WIN32','/DNOMINMAX',
            '/DSPDLOG_COMPILED_LIB','/DSPDLOG_FMT_EXTERNAL',
            '/DENABLE_SKYRIM_SE=1','/DENABLE_SKYRIM_AE=1',
            '/DMORA_WITH_COMMONLIB',
            '/USKSE_SUPPORT_XBYAK',
            "/I$proj/include",
            "/I$proj/extern/CommonLibSSE-NG/include",
            "/I$proj/extern/spdlog-shim",
            "/I$proj/extern/simplemath-shim",
            '/FISKSE/Impl/PCH.h'
          )

          $patterns = @(
            'src/core/*.cpp','src/data/*.cpp','src/diag/*.cpp',
            'src/eval/*.cpp','src/emit/*.cpp',
            'src/rt/*.cpp','src/rt/handlers/*.cpp',
            'src/dag/*.cpp','src/model/*.cpp'
          )
          $sources = @()
          foreach ($p in $patterns) { $sources += Get-ChildItem -Path $p -ErrorAction SilentlyContinue }
          $sources = $sources | Where-Object {
            $_.Name -ne 'form_model_verify.cpp' -and $_.Name -ne 'renderer.cpp'
          }

          # Regenerate relations_seed.cpp (xmake.lua does this pre-build; we replicate it)
          python tools/gen_relations.py
          if ($LASTEXITCODE -ne 0) { throw "gen_relations.py failed" }

          # cl /MP compiles all inputs in parallel in a single invocation.
          $allSources = @($sources.FullName) + @(
            "$proj/extern/spdlog-shim/spdlog.cpp",
            "$proj/extern/spdlog-shim/fmt.cpp"
          )
          $nproc = [Environment]::ProcessorCount
          Write-Host "Compiling $($allSources.Count) files with /MP$nproc ..."
          & cl.exe @flags "/MP$nproc" '/c' "/Fo$buildDir/" @allSources
          if ($LASTEXITCODE -ne 0) { throw "cl.exe failed" }

          $objFiles = @()
          foreach ($p in $allSources) {
            $objFiles += "$buildDir/$([System.IO.Path]::GetFileNameWithoutExtension($p)).obj"
          }

          & lib.exe /nologo "/out:$proj/data/mora_rt.lib" $objFiles
          if ($LASTEXITCODE -ne 0) { throw "lib.exe failed" }
          Write-Host "Produced data/mora_rt.lib"

      - name: Link MoraRuntime.dll
        run: |
          $ErrorActionPreference = 'Stop'
          $proj = $PWD.Path
          $outDir = "$proj/build/runtime"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          & link.exe /nologo /dll "/out:$outDir/MoraRuntime.dll" /machine:x64 `
            "/def:$proj/scripts/MoraRuntime.def" `
            "/wholearchive:$proj/data/mora_rt.lib" `
            "$proj/extern/CommonLibSSE-NG/CommonLibSSE.lib" `
            msvcrt.lib ucrt.lib vcruntime.lib `
            kernel32.lib user32.lib advapi32.lib `
            ole32.lib shell32.lib `
            dxgi.lib version.lib d3dcompiler.lib dbghelp.lib `
            d3d11.lib bcrypt.lib
          if ($LASTEXITCODE -ne 0) { throw "link.exe failed" }

          Get-Item "$outDir/MoraRuntime.dll" | Format-List Name,Length,LastWriteTime

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Cache xmake packages (Windows)
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/.xmake
            build/.packages
          key: xmake-windows-${{ hashFiles('xmake.lua') }}
          restore-keys: xmake-windows-

      - name: Build mora.exe (CLI compiler)
        run: |
          $ErrorActionPreference = 'Stop'
          xmake f -p windows -a x64 -m release -y
          if ($LASTEXITCODE -ne 0) { throw "xmake f failed" }
          xmake build -y mora
          if ($LASTEXITCODE -ne 0) { throw "xmake build mora failed" }
          $exe = Get-ChildItem -Recurse -Path build -Filter mora.exe | Select-Object -First 1
          if (-not $exe) { throw "mora.exe not found under build/" }
          Write-Host "Built $($exe.FullName)"
          "MORA_EXE=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Download VS Code extension .vsix
        uses: actions/download-artifact@v4
        with:
          name: mora-vscode-vsix
          path: dist/vsix

      - name: Package release archive
        run: |
          $ErrorActionPreference = 'Stop'
          $proj = $PWD.Path
          $ref  = "${{ github.ref }}"
          if ($ref.StartsWith('refs/tags/v')) {
            $version = $ref.Substring('refs/tags/v'.Length)
          } else {
            $version = "0.0.0-$("${{ github.sha }}".Substring(0,7))"
          }
          Write-Host "Release version: $version"
          $stage = "$proj/dist/Mora-$version-windows"
          New-Item -ItemType Directory -Force -Path "$stage/tools/Mora" | Out-Null
          New-Item -ItemType Directory -Force -Path "$stage/Data/SKSE/Plugins" | Out-Null
          Copy-Item "$env:MORA_EXE"                     "$stage/tools/Mora/mora.exe"
          Copy-Item "$proj/build/runtime/MoraRuntime.dll" "$stage/Data/SKSE/Plugins/MoraRuntime.dll"
          $vsix = Get-ChildItem -Path "$proj/dist/vsix" -Filter mora-vscode-*.vsix | Select-Object -First 1
          if (-not $vsix) { throw "VS Code .vsix not found in dist/vsix" }
          Copy-Item $vsix.FullName "$stage/tools/Mora/$($vsix.Name)"
          Write-Host "Bundled $($vsix.Name) into release archive"
          $zip = "$proj/dist/Mora-$version-windows.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          Write-Host "Packaged $zip"
          Get-ChildItem $stage -Recurse | ForEach-Object {
            Write-Host ("  " + $_.FullName.Substring($stage.Length + 1))
          }
          "MORA_VERSION=$version"  | Out-File -FilePath $env:GITHUB_ENV -Append
          "MORA_ZIP=$zip"          | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: Mora-windows
          path: dist/Mora-*-windows.zip
          if-no-files-found: error

      # ─────────────────────────────────────────────────────────────
      # Publish to Nexus Mods — only on tag pushes (refs/tags/v*).
      # Requires two repo-level config items:
      #   • secret  NEXUS_API_KEY       — your Nexus API key
      #   • variable NEXUS_FILE_GROUP_ID — found on the mod's Files tab,
      #                                   "API Info" in the edit dropdown
      # Uses the official v3 Upload API via Nexus-Mods/upload-action.
      # ─────────────────────────────────────────────────────────────
      - name: Publish to Nexus Mods
        if: startsWith(github.ref, 'refs/tags/v')
        uses: Nexus-Mods/upload-action@v1.0.0-beta.4
        with:
          api_key:       ${{ secrets.NEXUS_API_KEY }}
          file_group_id: ${{ vars.NEXUS_FILE_GROUP_ID }}
          filename:      ${{ env.MORA_ZIP }}
          version:       ${{ env.MORA_VERSION }}
          display_name:  Mora ${{ env.MORA_VERSION }}
          file_category: main
          description:   |
            Mora ${{ env.MORA_VERSION }} — Windows x64 build.

            Archive layout (extract into your Skyrim SE install root):
              • tools/Mora/mora.exe                  — CLI compiler
              • Data/SKSE/Plugins/MoraRuntime.dll    — SKSE runtime plugin

            Built by GitHub Actions from commit ${{ github.sha }}.
