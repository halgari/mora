name: CI

on:
  push:
    branches: [master, rust-kid-pivot]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets

  windows-cross:
    name: Windows cross-compile (cargo-xwin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked
      - name: Cross-compile check
        run: cargo xwin check --target x86_64-pc-windows-msvc --workspace

  integration-gate:
    name: Integration gate check
    runs-on: ubuntu-latest
    outputs:
      has_rust_ready: ${{ steps.check.outputs.has_rust_ready }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        shell: bash
        run: |
          # True if any tests/integration/<case>/rust-ready.marker exists.
          if compgen -G "tests/integration/**/rust-ready.marker" > /dev/null; then
              echo "has_rust_ready=true" >> "$GITHUB_OUTPUT"
          else
              echo "has_rust_ready=false" >> "$GITHUB_OUTPUT"
          fi

  skyrim-integration:
    # Gated until M5 wires a Rust harness into tests/integration/.
    # Flip `if: false` to a real condition (e.g. a gate-check job that
    # emits an output from `hashFiles(...)` — job-level `if:` expressions
    # cannot call hashFiles directly) when the first Rust-ready case
    # lands.
    name: Skyrim integration (self-hosted)
    runs-on: [self-hosted, linux, unraid, skyrim]
    if: needs.integration-gate.outputs.has_rust_ready == 'true'
    needs: [test, windows-cross, integration-gate]
    steps:
      - uses: actions/checkout@v4
      - name: Build Linux artifacts
        run: cargo build --release --workspace
      - name: Cross-compile Windows DLLs
        run: cargo xwin build --release --target x86_64-pc-windows-msvc -p mora-runtime -p mora-test-harness
      - name: Placeholder — full orchestration lands in M5
        run: |
          echo "Skyrim integration pipeline will be implemented in M5."
          echo "When implemented, this step will iterate rust-ready cases,"
          echo "stage mod-dirs, invoke /usr/local/bin/run-skyrim-test.sh,"
          echo "and assert via check.sh hooks."
