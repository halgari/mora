name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (xmake + gtest)
    # skyrim-runner:local bakes gcc-13, xmake v3.0.8, python3-yaml, and
    # XMAKE_ROOT=y at the image level — no per-run install needed.
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
        with:
          # CLI11 + zlib + CommonLibSSE-NG live under extern/ — the
          # Linux build only needs CLI11, but pulling them all keeps
          # the checkout behavior uniform with windows-xcompile.
          submodules: recursive

      - name: Restore file mtimes (xmake cache correctness)
        # actions/checkout@v4 stamps every file mtime to "now", which
        # defeats xmake 3.0.8's mtime-based rebuild detection — cached
        # .o files look older than their sources and get rebuilt.
        # Resetting source mtimes to their last-commit time makes them
        # older than cached objects so xmake reuses them.
        run: |
          if ! command -v git-restore-mtime >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends git-mestrelion-tools
          fi
          git restore-mtime --first-parent -y
          git submodule foreach --recursive 'git restore-mtime --first-parent -y'

      # Cache xmake's package dir + the per-platform object and dep
      # trees so incremental rebuilds can reuse unchanged objects.
      # - key is sha-suffixed so every run uploads a fresh cache;
      # - restore-keys falls back to the most recent cache sharing the
      #   same xmake.lua hash (and finally any linux cache).
      # xmake tracks source-hash invalidation in build/.deps/, so stale
      # objects are correctly rebuilt when a source file changes.
      - name: Cache xmake packages + objects
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake
            build/.packages
            build/.objs
            build/.deps
          key: xmake-linux-${{ hashFiles('xmake.lua') }}-${{ github.sha }}
          restore-keys: |
            xmake-linux-${{ hashFiles('xmake.lua') }}-
            xmake-linux-

      - name: Configure
        # -pthread: std::thread link on gcc's libstdc++
        # -Wno-dangling-reference: gcc-13 false positive in some TUs
        run: xmake f -y -m releasedbg --cxflags="-pthread -Wno-dangling-reference" --ldflags=-pthread

      - name: Build
        run: xmake build -y

      - name: Run tests
        run: xmake test -v

      # Reused by the skyrim-integration job (see ci.yml `needs:` below)
      # so it doesn't have to rebuild the same binary on the Skyrim pool.
      - name: Upload native linux mora
        uses: actions/upload-artifact@v4
        with:
          name: mora-linux
          path: build/linux/x86_64/releasedbg/mora
          if-no-files-found: error

  extension:
    name: VS Code extension (.vsix)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Verify version matches xmake.lua
        run: |
          xmake_version=$(grep -oP 'set_version\("\K[^"]+' xmake.lua)
          pkg_version=$(node -p "require('./editors/vscode/package.json').version")
          echo "xmake.lua version:    $xmake_version"
          echo "package.json version: $pkg_version"
          if [ "$xmake_version" != "$pkg_version" ]; then
            echo "::error::xmake.lua and editors/vscode/package.json version mismatch"
            exit 1
          fi

      - name: Compile TypeScript
        working-directory: editors/vscode
        run: npm run compile

      - name: Run grammar tests
        working-directory: editors/vscode
        run: npm run test:grammar

      - name: Package .vsix
        working-directory: editors/vscode
        run: npm run package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: mora-vscode-vsix
          path: editors/vscode/mora-vscode-*.vsix
          if-no-files-found: error

  windows-xcompile:
    # Cross-compile mora.exe + MoraRuntime.dll + MoraTestHarness.dll on the
    # self-hosted Linux runner using clang-cl + lld-link + xwin sysroot.
    # No Visual Studio, no Windows runner, no wine.
    #
    # skyrim-runner:local bakes the whole toolchain: clang / lld / llvm,
    # xmake v3.0.8, xwin binary, and a pre-splatted sysroot at /opt/xwin
    # (XWIN_PATH env set at the image level). No per-run install needed.
    name: Windows (clang-cl cross-compile on self-hosted linux)
    runs-on: [self-hosted, linux]
    needs: extension
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore file mtimes (xmake cache correctness)
        # actions/checkout@v4 stamps every file mtime to "now", which
        # defeats xmake 3.0.8's mtime-based rebuild detection — cached
        # .o files look older than their sources and get rebuilt (the
        # pain point is the ~1700 TUs under
        # extern/CommonLibSSE-NG/src/**.cpp). Resetting source mtimes
        # to their last-commit time makes them older than cached
        # objects so xmake reuses them.
        run: |
          if ! command -v git-restore-mtime >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends git-mestrelion-tools
          fi
          git restore-mtime --first-parent -y
          git submodule foreach --recursive 'git restore-mtime --first-parent -y'

      # See ci.yml's `linux` job for the cache-key rationale. Hitting
      # the warm object cache is especially valuable here: the
      # CommonLibSSE-NG submodule contributes ~1700 .cpp files that
      # otherwise recompile from scratch every run.
      - name: Cache xmake packages + objects
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake
            build/.packages
            build/.objs
            build/.deps
          key: xmake-xcompile-${{ hashFiles('xmake.lua') }}-${{ github.sha }}
          restore-keys: |
            xmake-xcompile-${{ hashFiles('xmake.lua') }}-
            xmake-xcompile-

      - name: Configure (windows / clang-cl + xwin)
        # No --toolchain flag — project sets it via set_toolchains inside
        # the is_plat("windows") block. Both xmake 2.9.9 and 3.0.8 have
        # known --toolchain=xwin-clang-cl CLI issues (package include
        # dirs / project-toolchain lookup respectively); keeping the
        # toolchain selection inside xmake.lua sidesteps both.
        run: xmake f -p windows -a x64 -m release -y

      - name: Build mora.exe + MoraRuntime.dll + MoraTestHarness.dll
        # xmake 2.9.9 on the runner only accepts one positional target
        # per invocation (3.x+ supports a list). Keep three lines.
        run: |
          xmake build -y mora
          xmake build -y mora_runtime
          xmake build -y mora_test_harness

      - name: List built binaries
        run: ls -lh build/windows/x64/release/

      - name: Download VS Code extension .vsix
        uses: actions/download-artifact@v4
        with:
          name: mora-vscode-vsix
          path: dist/vsix

      - name: Package release archive
        run: |
          set -euo pipefail
          proj=$GITHUB_WORKSPACE
          ref=${GITHUB_REF:-}
          if [[ "$ref" == refs/tags/v* ]]; then
            version=${ref#refs/tags/v}
          else
            version="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "Release version: $version"
          stage="$proj/dist/Mora-$version-windows"
          # Single Data/-rooted layout so MO2 / Vortex auto-detect the
          # archive as a Skyrim mod. Only the SKSE runtime plugin lives
          # under SKSE/Plugins/ (auto-loaded on game launch);
          # MoraTestHarness.dll is a CI/dev plugin and is bundled under
          # tools/Mora/ so ordinary installs don't auto-load it.
          mkdir -p "$stage/Data/tools/Mora" "$stage/Data/SKSE/Plugins"
          cp "$proj/build/windows/x64/release/mora.exe"              "$stage/Data/tools/Mora/mora.exe"
          cp "$proj/build/windows/x64/release/MoraRuntime.dll"       "$stage/Data/SKSE/Plugins/MoraRuntime.dll"
          cp "$proj/build/windows/x64/release/MoraTestHarness.dll"   "$stage/Data/tools/Mora/MoraTestHarness.dll"
          vsix=$(ls "$proj/dist/vsix"/mora-vscode-*.vsix | head -1)
          if [[ -z "$vsix" ]]; then
            echo "::error::VS Code .vsix not found in dist/vsix"
            exit 1
          fi
          cp "$vsix" "$stage/Data/tools/Mora/$(basename "$vsix")"
          echo "Bundled $(basename "$vsix") into release archive"
          zip="$proj/dist/Mora-$version-windows.zip"
          (cd "$stage" && zip -r "$zip" .)
          echo "Packaged $zip"
          find "$stage" -type f | sed "s|$stage/||"
          echo "MORA_VERSION=$version" >> "$GITHUB_ENV"
          echo "MORA_ZIP=$zip"         >> "$GITHUB_ENV"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: Mora-windows
          path: dist/Mora-*-windows.zip
          if-no-files-found: error

      # ─────────────────────────────────────────────────────────────
      # Publish to Nexus Mods — only on tag pushes (refs/tags/v*).
      # Requires two repo-level config items:
      #   • secret  NEXUS_API_KEY       — your Nexus API key
      #   • variable NEXUS_FILE_GROUP_ID — found on the mod's Files tab,
      #                                   "API Info" in the edit dropdown
      # Uses the official v3 Upload API via Nexus-Mods/upload-action.
      # ─────────────────────────────────────────────────────────────
      - name: Publish to Nexus Mods
        if: startsWith(github.ref, 'refs/tags/v')
        uses: Nexus-Mods/upload-action@v1.0.0-beta.4
        with:
          api_key:       ${{ secrets.NEXUS_API_KEY }}
          file_group_id: ${{ vars.NEXUS_FILE_GROUP_ID }}
          filename:      ${{ env.MORA_ZIP }}
          version:       ${{ env.MORA_VERSION }}
          display_name:  Mora ${{ env.MORA_VERSION }}
          file_category: main
          description:   |
            Mora ${{ env.MORA_VERSION }} — Windows x64 build.

            Archive layout (extract into your Skyrim SE install root,
            or install via MO2 / Vortex with data-dir = Data/):
              • Data/SKSE/Plugins/MoraRuntime.dll  — SKSE runtime plugin (auto-loaded)
              • Data/tools/Mora/mora.exe           — CLI compiler / LSP
              • Data/tools/Mora/MoraTestHarness.dll — CI / dev test harness (NOT auto-loaded)
              • Data/tools/Mora/mora-vscode-*.vsix  — VS Code extension (sideload)

            Built by GitHub Actions from commit ${{ github.sha }}
            (cross-compiled on Ubuntu with clang-cl + xwin).

  # ═══════════════════════════════════════════════════════════════
  # Skyrim-in-the-loop integration tests.
  #
  # Runs on the self-hosted skyrim-runner pool (labels self-hosted,
  # linux, unraid, skyrim — image source at
  # root@10.20.77.32:/mnt/user/skyrim-runner/). Each matrix entry is a
  # directory under tests/integration/<case>/ with rules.mora +
  # check.sh:
  #
  #   1. Download the Mora-windows release archive (mora.exe +
  #      MoraRuntime.dll + MoraTestHarness.dll).
  #   2. Compile rules.mora under Proton-GE → mora_patches.bin.
  #   3. Stage a mod-dir with both SKSE plugins + the patches.
  #   4. /usr/local/bin/run-skyrim-test.sh overlays the mod-dir onto
  #      /skyrim-base + /skyrim-baseline, launches Skyrim under
  #      Xorg+Proton, and invokes check.sh as TEST_HOOK.
  #
  # Adding a new test case: drop a new tests/integration/<case>/ dir,
  # append <case> to the matrix below. No workflow changes beyond that.
  # ═══════════════════════════════════════════════════════════════
  skyrim-integration:
    name: Skyrim integration (${{ matrix.case }})
    needs: [linux, windows-xcompile]
    # Fork PRs must never reach the skyrim-runner pool — they can
    # execute arbitrary code in the runner container. Same guard
    # pattern as skyrim-runner/examples/pr-test.yml.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux, unraid, skyrim]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        case:
          - weapon_damage
          - nazeem
          - weapon_setters
          - armor_setters
          - npc_setters
          - leveled_list_setters
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: Mora-windows
          path: dist/

      # ── mora compiler: reuse the artifact built by the `linux` job ──
      # Running mora natively (rather than mora.exe under Proton/wine)
      # avoids the Proton/wine stdout quagmire — mora.exe is a plain
      # console app whose output Proton hides, with segfaults under
      # raw wine64 on this container. The compiler has no OS-specific
      # patches logic, so the native linux binary produces an
      # identical mora_patches.bin.
      - name: Download native linux mora
        uses: actions/download-artifact@v4
        with:
          name: mora-linux
          path: bin

      - name: Make mora executable
        run: chmod +x bin/mora

      - name: Stage mod-under-test and compile mora rules (native linux)
        env:
          CASE: ${{ matrix.case }}
        run: |
          set -euo pipefail

          # Unpack the Windows release zip for the SKSE plugin DLLs.
          # The zip is built with a single Data/ root (see the packaging
          # step in the windows-xcompile job): MoraRuntime.dll lives at
          # Data/SKSE/Plugins/ (auto-loaded by SKSE in-game);
          # MoraTestHarness.dll lives at Data/tools/Mora/ so ordinary
          # user installs don't auto-load it. The integration test
          # needs both under SKSE/Plugins/ in the staged mod-dir — the
          # harness has to run for the test — so we relocate the
          # harness DLL during staging.
          unzip -q dist/Mora-*-windows.zip -d artifacts/
          RELEASE_DIR=artifacts

          # Stage the mod-dir that run-skyrim-test.sh will overlay onto
          # /skyrim-base + /skyrim-baseline.
          # MoraRuntime.dll reads mora_patches.bin from its own directory
          # (src/rt/plugin_entry.cpp: `dll_dir / "mora_patches.bin"`), so
          # the patches file must sit next to the DLL in SKSE/Plugins/ —
          # not in a sibling Data/MoraCache/ directory.
          STAGE="$GITHUB_WORKSPACE/mod-under-test"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/Data/SKSE/Plugins"
          cp "$RELEASE_DIR/Data/SKSE/Plugins/MoraRuntime.dll" \
             "$STAGE/Data/SKSE/Plugins/MoraRuntime.dll"
          cp "$RELEASE_DIR/Data/tools/Mora/MoraTestHarness.dll" \
             "$STAGE/Data/SKSE/Plugins/MoraTestHarness.dll"

          # Compile the rule via the native linux mora (downloaded
          # artifact built by the `linux` job — see ci.yml `needs:`).
          MORA_BIN="$GITHUB_WORKSPACE/bin/mora"
          echo "Using mora binary: $MORA_BIN"

          # Synthesize a plugins.txt matching a clean GOG AE install's
          # runtime load order, because the runner image doesn't ship
          # a real Plugins.txt in any standard location. Without a
          # plugins.txt, mora's directory-walk fallback mis-orders CC
          # content and compile-time FormIDs diverge from runtime.
          # Order (mirrors engine behavior for a user with an empty
          # Plugins.txt):
          #   1. Bethesda hardcoded base masters, canonical order.
          #   2. Creation Club plugins listed in Skyrim.ccc.
          #   3. Anything else in Data/ alphabetically (belt-and-braces).
          GEN_TXT="$GITHUB_WORKSPACE/plugins.gen.txt"
          : > "$GEN_TXT"

          for p in Skyrim.esm Update.esm Dawnguard.esm HearthFires.esm Dragonborn.esm; do
            [[ -f "/skyrim-base/Data/$p" ]] && echo "*$p" >> "$GEN_TXT"
          done

          CCC_FILE=""
          for cand in /skyrim-base/Skyrim.ccc /skyrim-base/skyrim.ccc; do
            [[ -f "$cand" ]] && CCC_FILE="$cand" && break
          done

          if [[ -n "$CCC_FILE" ]]; then
            echo "Found CC manifest: $CCC_FILE ($(wc -l < "$CCC_FILE") entries)"
            awk '{sub(/\r$/,""); gsub(/^[[:space:]]+|[[:space:]]+$/,""); if (length) print "*" $0}' \
              "$CCC_FILE" >> "$GEN_TXT"
          else
            echo "::warning::No Skyrim.ccc on runner — CC load order may mismatch runtime"
            ls -la /skyrim-base 2>/dev/null | head -20 || true
          fi

          # Dedup in case something's listed in both base + CCC, and
          # append any remaining Data/ plugins we haven't covered.
          # Skyrim.ccc casing occasionally drifts from the actual file
          # on disk (e.g. ccMTYSSE001-KnightsoftheNine.esl vs ...OfTheNine.esl).
          # Wine at runtime is case-insensitive so those all load, but
          # a compile-time case-sensitive file check would silently
          # drop them and throw off ESL indices for every subsequent
          # light plugin. Map filenames via a case-insensitive index.
          python3 - "$GEN_TXT" /skyrim-base/Data <<'PY'
          import os, sys
          gen = sys.argv[1]
          data_dir = sys.argv[2]
          try:
              disk_files = os.listdir(data_dir)
          except FileNotFoundError:
              disk_files = []
          by_lower = {f.lower(): f for f in disk_files}

          seen_lower = set()
          with open(gen) as f:
              lines = [ln.rstrip("\n") for ln in f if ln.strip()]
          out = []
          for ln in lines:
              name = ln.lstrip("*").strip()
              key = name.lower()
              if key in seen_lower:
                  continue
              actual = by_lower.get(key)
              if not actual:
                  continue
              seen_lower.add(key)
              out.append("*" + actual)  # use the on-disk casing

          # Append remaining plugins that exist in Data/ but aren't listed.
          for entry in sorted(disk_files, key=str.lower):
              if not entry.lower().endswith((".esm", ".esp", ".esl")):
                  continue
              if entry.lower() in seen_lower:
                  continue
              seen_lower.add(entry.lower())
              out.append("*" + entry)
          with open(gen, "w") as f:
              f.write("\n".join(out) + "\n")
          PY

          echo "Generated plugins.txt ($(wc -l < "$GEN_TXT") entries):"
          head -20 "$GEN_TXT"
          echo "  ..."
          tail -5 "$GEN_TXT"
          PLUGINS_ARG=(--plugins-txt "$GEN_TXT")

          "$MORA_BIN" compile \
            "tests/integration/${CASE}/rules.mora" \
            --data-dir /skyrim-base/Data \
            "${PLUGINS_ARG[@]}" \
            --output "$STAGE/Data/SKSE/Plugins"

          # Sanity: mora_patches.bin must exist AND contain at least one
          # patch. The v2 header is 88 bytes when empty, so anything above
          # that means the compiler emitted at least one patch. Narrow
          # target-specific rules (e.g. `*_setters` cases that scope to a
          # single FormID) bottom out around ~100 bytes; broadcast rules
          # (nazeem, weapon_damage) end up in the tens of KB.
          BIN="$STAGE/Data/SKSE/Plugins/mora_patches.bin"
          test -s "$BIN"
          bin_size=$(stat -c %s "$BIN")
          echo "mora_patches.bin size: $bin_size bytes"
          if (( bin_size <= 88 )); then
            echo "::error::mora_patches.bin is $bin_size bytes — compiler emitted no patches"
            exit 1
          fi
          ls -la "$STAGE/Data/SKSE/Plugins"

      - name: Run Skyrim integration test
        env:
          TEST_HOOK:    ${{ github.workspace }}/tests/integration/${{ matrix.case }}/check.sh
          TEST_TIMEOUT: "600"
          LOG_DIR:      /tmp/skyrim-logs-${{ github.run_id }}-${{ matrix.case }}
        run: /usr/local/bin/run-skyrim-test.sh "$GITHUB_WORKSPACE/mod-under-test"

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skyrim-logs-${{ matrix.case }}-${{ github.run_attempt }}
          path: /tmp/skyrim-logs-${{ github.run_id }}-${{ matrix.case }}/
          if-no-files-found: warn
