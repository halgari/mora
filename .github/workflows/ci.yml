name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (xmake + gtest)
    runs-on: [self-hosted, linux]
    env:
      # myoung34/github-runner containers run as root; xmake refuses unless told.
      XMAKE_ROOT: y
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          # Self-hosted myoung34/github-runner runs as root; no sudo needed
          set -e
          cat /etc/os-release | head -2
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            software-properties-common build-essential git curl unzip zip pkg-config \
            libreadline-dev python3-pip
          # Ensure universe (jammy) and toolchain PPA — guarantees g++-12 availability.
          add-apt-repository -y universe || true
          add-apt-repository -y ppa:ubuntu-toolchain-r/test || true
          apt-get update
          # Install newest g++ we can get; fall through versions.
          GPP=""
          # GitHub's ubuntu-latest uses gcc-13 (on 24.04). Match that.
          for v in 13 14 12; do
            if DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends g++-$v gcc-$v; then
              GPP=$v; break
            fi
          done
          if [[ -z "$GPP" ]]; then echo "no modern g++ available" >&2; exit 1; fi
          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-$GPP 100
          update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-$GPP 100
          pip install pyyaml
          g++ --version | head -1

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake
            build/.packages
          key: xmake-linux-${{ hashFiles('xmake.lua') }}
          restore-keys: xmake-linux-

      - name: Configure
        # -pthread: std::thread link under manually-installed gcc
        # -include stddef.h: guarantees global ::size_t (g++-12 headers no longer
        #   transitively pull it in; project sources use bare 'size_t' at namespace scope)
        # -Wno-dangling-reference: gcc-13+ warning (forward-compat: gcc-12 ignores unknown -Wno-*)
        run: xmake f -y -m releasedbg --cxflags="-pthread -include stddef.h -Wno-dangling-reference" --ldflags=-pthread

      - name: Build
        run: xmake build -y

      - name: Run tests
        run: xmake test -v

  extension:
    name: VS Code extension (.vsix)
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Verify version matches xmake.lua
        run: |
          xmake_version=$(grep -oP 'set_version\("\K[^"]+' xmake.lua)
          pkg_version=$(node -p "require('./editors/vscode/package.json').version")
          echo "xmake.lua version:    $xmake_version"
          echo "package.json version: $pkg_version"
          if [ "$xmake_version" != "$pkg_version" ]; then
            echo "::error::xmake.lua and editors/vscode/package.json version mismatch"
            exit 1
          fi

      - name: Compile TypeScript
        working-directory: editors/vscode
        run: npm run compile

      - name: Run grammar tests
        working-directory: editors/vscode
        run: npm run test:grammar

      - name: Package .vsix
        working-directory: editors/vscode
        run: npm run package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: mora-vscode-vsix
          path: editors/vscode/mora-vscode-*.vsix
          if-no-files-found: error

  windows-xcompile:
    # Cross-compile mora.exe + MoraRuntime.dll + MoraTestHarness.dll on the
    # self-hosted Linux runner using clang-cl + lld-link + xwin sysroot.
    # No Visual Studio, no Windows runner, no wine.
    name: Windows (clang-cl cross-compile on self-hosted linux)
    runs-on: [self-hosted, linux]
    env:
      # myoung34/github-runner containers run as root; xmake refuses unless told.
      XMAKE_ROOT: y
    needs: extension
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang / lld / llvm + python
        run: |
          # Self-hosted myoung34/github-runner runs as root; no sudo needed
          set -e
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            clang lld llvm python3-pip xz-utils zip curl ca-certificates
          pip install pyyaml

      - name: Install xwin
        run: |
          set -e
          XWIN_VERSION=0.8.0
          curl -fsSL -o /tmp/xwin.tar.gz \
            "https://github.com/Jake-Shadle/xwin/releases/download/${XWIN_VERSION}/xwin-${XWIN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/xwin.tar.gz -C /tmp --strip-components=1
          mv /tmp/xwin /usr/local/bin/xwin
          xwin --version

      - name: Cache xwin sysroot
        id: xwin-cache
        uses: actions/cache@v4
        with:
          path: ~/.xwin
          # Bump this key when the xwin version above changes to force
          # a re-splat of the SDK/CRT into the new layout.
          key: xwin-sysroot-v0.8.0

      - name: Splat xwin sysroot
        if: steps.xwin-cache.outputs.cache-hit != 'true'
        run: xwin --accept-license splat --output $HOME/.xwin

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake
            build/.packages
          key: xmake-xcompile-${{ hashFiles('xmake.lua') }}
          restore-keys: xmake-xcompile-

      - name: Configure (windows / clang-cl + xwin)
        run: xmake f -p windows -a x64 --toolchain=xwin-clang-cl -m release -y

      - name: Build mora.exe + MoraRuntime.dll + MoraTestHarness.dll
        run: |
          xmake build -y mora
          xmake build -y mora_runtime
          xmake build -y mora_test_harness

      - name: List built binaries
        run: |
          ls -lh build/windows/x64/release/
          file build/windows/x64/release/*.exe build/windows/x64/release/*.dll

      - name: Download VS Code extension .vsix
        uses: actions/download-artifact@v4
        with:
          name: mora-vscode-vsix
          path: dist/vsix

      - name: Package release archive
        run: |
          set -euo pipefail
          proj=$GITHUB_WORKSPACE
          ref=${GITHUB_REF:-}
          if [[ "$ref" == refs/tags/v* ]]; then
            version=${ref#refs/tags/v}
          else
            version="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "Release version: $version"
          stage="$proj/dist/Mora-$version-windows"
          mkdir -p "$stage/tools/Mora" "$stage/Data/SKSE/Plugins"
          cp "$proj/build/windows/x64/release/mora.exe"              "$stage/tools/Mora/mora.exe"
          cp "$proj/build/windows/x64/release/MoraRuntime.dll"       "$stage/Data/SKSE/Plugins/MoraRuntime.dll"
          cp "$proj/build/windows/x64/release/MoraTestHarness.dll"   "$stage/Data/SKSE/Plugins/MoraTestHarness.dll"
          vsix=$(ls "$proj/dist/vsix"/mora-vscode-*.vsix | head -1)
          if [[ -z "$vsix" ]]; then
            echo "::error::VS Code .vsix not found in dist/vsix"
            exit 1
          fi
          cp "$vsix" "$stage/tools/Mora/$(basename "$vsix")"
          echo "Bundled $(basename "$vsix") into release archive"
          zip="$proj/dist/Mora-$version-windows.zip"
          (cd "$stage" && zip -r "$zip" .)
          echo "Packaged $zip"
          find "$stage" -type f | sed "s|$stage/||"
          echo "MORA_VERSION=$version" >> "$GITHUB_ENV"
          echo "MORA_ZIP=$zip"         >> "$GITHUB_ENV"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: Mora-windows
          path: dist/Mora-*-windows.zip
          if-no-files-found: error

      # ─────────────────────────────────────────────────────────────
      # Publish to Nexus Mods — only on tag pushes (refs/tags/v*).
      # Requires two repo-level config items:
      #   • secret  NEXUS_API_KEY       — your Nexus API key
      #   • variable NEXUS_FILE_GROUP_ID — found on the mod's Files tab,
      #                                   "API Info" in the edit dropdown
      # Uses the official v3 Upload API via Nexus-Mods/upload-action.
      # ─────────────────────────────────────────────────────────────
      - name: Publish to Nexus Mods
        if: startsWith(github.ref, 'refs/tags/v')
        uses: Nexus-Mods/upload-action@v1.0.0-beta.4
        with:
          api_key:       ${{ secrets.NEXUS_API_KEY }}
          file_group_id: ${{ vars.NEXUS_FILE_GROUP_ID }}
          filename:      ${{ env.MORA_ZIP }}
          version:       ${{ env.MORA_VERSION }}
          display_name:  Mora ${{ env.MORA_VERSION }}
          file_category: main
          description:   |
            Mora ${{ env.MORA_VERSION }} — Windows x64 build.

            Archive layout (extract into your Skyrim SE install root):
              • tools/Mora/mora.exe                   — CLI compiler
              • Data/SKSE/Plugins/MoraRuntime.dll     — SKSE runtime plugin
              • Data/SKSE/Plugins/MoraTestHarness.dll — Integration test harness

            Built by GitHub Actions from commit ${{ github.sha }}
            (cross-compiled on Ubuntu with clang-cl + xwin).
