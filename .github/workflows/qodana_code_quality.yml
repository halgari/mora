name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR head, not the merge commit — qodana's PR
          # mode expects the same sha the author pushed.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: recursive

      # qodana-clang needs a compile_commands.json so it knows which TUs
      # exist and how they're compiled. This project builds with xmake,
      # which emits that database via its `project -k compile_commands`
      # generator. Run it under the same configure flags the main Linux
      # CI job uses (ci.yml's `linux` job) so the TU list matches.
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Generate compile_commands.json
        run: |
          xmake f -y -m releasedbg \
            --cxflags="-pthread -Wno-dangling-reference" \
            --ldflags=-pthread
          # xmake takes the output directory as a positional arg (not
          # a -x flag). End result is ./build/compile_commands.json —
          # the default path qodana-clang's --compile-commands looks at.
          xmake project -k compile_commands build
          test -s build/compile_commands.json
          echo "compile_commands.json: $(wc -l < build/compile_commands.json) lines"

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3
        with:
          pr-mode: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_868088967 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'