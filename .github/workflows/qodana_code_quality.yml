name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR head, not the merge commit — qodana's PR
          # mode expects the same sha the author pushed.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          submodules: recursive

      # qodana-clang needs a compile_commands.json so it knows which TUs
      # exist and how they're compiled. This project builds with xmake,
      # which emits that database via its `project -k compile_commands`
      # generator. Run it under the same configure flags the main Linux
      # CI job uses (ci.yml's `linux` job) so the TU list matches.
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Generate compile_commands.json
        # qodana-clang reads compile_commands.json and invokes clang on
        # each TU. xmake emits entries with absolute paths — the repo
        # root (GITHUB_WORKSPACE) and include dirs into xmake's package
        # cache ($HOME/.xmake/packages/...). Neither resolves inside
        # the qodana-clang container, which bind-mounts only the repo
        # checkout at /data/project/ (and nothing else). Fix by:
        #   1. fetching every package + building once so the cache is
        #      fully populated (xmake's lazy fetch won't run inside the
        #      container);
        #   2. copying the xmake cache into the repo at .xmake-deps/
        #      so it survives the mount into the container;
        #   3. rewriting both path prefixes to their in-container
        #      equivalents (/data/project/...).
        run: |
          set -euo pipefail

          xmake f -y -m releasedbg \
            --cxflags="-pthread -Wno-dangling-reference" \
            --ldflags=-pthread

          # Populate the package cache for every TU; xmake's TU
          # arguments reference package includedirs that only appear
          # after packages have been fetched + installed.
          xmake build -y

          # Stage the xmake cache inside the repo so qodana-clang's
          # bind-mount sees it.
          rm -rf .xmake-deps
          cp -a "$HOME/.xmake" .xmake-deps

          # Emit compile_commands.json, then rewrite absolute paths
          # so they resolve inside qodana-clang's /data/project/ mount.
          xmake project -k compile_commands build
          test -s build/compile_commands.json

          sed -i \
            -e "s|$HOME/.xmake|/data/project/.xmake-deps|g" \
            -e "s|$GITHUB_WORKSPACE|/data/project|g" \
            build/compile_commands.json

          # Sanity: no stray absolute host paths left.
          if grep -E "(/home/runner|$HOME)" build/compile_commands.json; then
            echo "::error::compile_commands.json still has host-absolute paths"
            exit 1
          fi
          echo "compile_commands.json: $(wc -l < build/compile_commands.json) lines, rewritten for container"

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3
        with:
          pr-mode: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_868088967 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'