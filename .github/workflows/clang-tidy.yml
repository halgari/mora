name: clang-tidy

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: clang-tidy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-tidy:
    name: clang-tidy (src/)
    # skyrim-runner:local bakes clang-19, xmake, and a full package
    # cache — same toolchain the main `linux` CI job uses.
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore file mtimes (xmake cache correctness)
        # actions/checkout@v4 stamps every file mtime to "now", which
        # defeats xmake 3.0.8's mtime-based rebuild detection — cached
        # .o files look older than their sources and get rebuilt.
        # Resetting source mtimes to their last-commit time makes them
        # older than cached objects so xmake reuses them.
        run: |
          python3 "$GITHUB_WORKSPACE/scripts/git-restore-mtime.py"
          git submodule foreach --recursive "python3 $GITHUB_WORKSPACE/scripts/git-restore-mtime.py"

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake
            build/.packages
          key: xmake-linux-${{ hashFiles('xmake.lua') }}
          restore-keys: xmake-linux-

      # clang-tidy is in clang-tools-extra, a sibling package to
      # clang-19 that isn't baked into the runner image.
      - name: Install clang-tidy
        run: |
          if ! command -v clang-tidy-19 >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends clang-tidy-19
          fi
          sudo ln -sf /usr/bin/clang-tidy-19 /usr/local/bin/clang-tidy
          sudo ln -sf /usr/bin/run-clang-tidy-19 /usr/local/bin/run-clang-tidy
          clang-tidy --version

      - name: Configure + build (populate package cache)
        # The build step fetches + installs xmake-managed packages; the
        # compile_commands step below needs their include dirs present on
        # disk or clang-tidy errors out with missing headers. The linux
        # `ci.yml` job adds `-Wno-dangling-reference` (a GCC flag) here,
        # but clang-19 rejects it as `unknown warning option` on every
        # TU, which aborts the compile-command parse and masks most
        # findings — so we leave it off for the clang-tidy build.
        run: |
          xmake f -y -m releasedbg --cxflags=-pthread --ldflags=-pthread
          xmake build -y

      - name: Generate compile_commands.json
        # `outputdir` is a positional argument to `xmake project`,
        # not a flag. Result: ./build/compile_commands.json.
        run: |
          xmake project -k compile_commands build
          test -s build/compile_commands.json

      - name: Run clang-tidy over src/
        # `run-clang-tidy -p build` reads build/compile_commands.json
        # and parallelizes across TUs. We scope to src/ so we're not
        # analyzing tests/ (gtest macros produce a lot of noise) or
        # extern/ (submodule code out of our control).
        #
        # `|| true` + `tee` — don't fail the job on findings yet.
        # Once the baseline is triaged, flip to strict: remove the
        # `|| true` and optionally add `-warnings-as-errors=*`.
        run: |
          run-clang-tidy -p build -quiet -j "$(nproc)" \
            "^$PWD/src/.*\.(cpp|cc)$" \
            2>&1 | tee clang-tidy.log || true

          # Useful single-number summaries for the workflow UI.
          warnings=$(grep -cE ':[0-9]+:[0-9]+: warning:' clang-tidy.log || true)
          errors=$(grep  -cE ':[0-9]+:[0-9]+: error:'   clang-tidy.log || true)
          echo "clang-tidy summary: $errors errors, $warnings warnings"
          {
            echo "## clang-tidy"
            echo ""
            echo "| severity | count |"
            echo "|----------|-------|"
            echo "| errors   | $errors |"
            echo "| warnings | $warnings |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload clang-tidy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-log
          path: clang-tidy.log
          if-no-files-found: warn
