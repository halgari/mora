namespace: player
relations:
  gold:
    type: countable<Int>
    args:
      - {name: P, type: FormRef}
      - {name: N, type: Int}
    source: handler
    apply_handler: PlayerAddGold
    docs: "Player gold count (additive delta via 'add')."

  notification:
    type: list<String>
    args:
      - {name: P, type: FormRef}
      - {name: S, type: String}
    source: handler
    apply_handler: PlayerShowNotification
    docs: "Queue a UI notification string."
