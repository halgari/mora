namespace: ref
relations:
  keyword:
    type: list<FormRef>
    args:
      - {name: R, type: FormRef}
      - {name: KW, type: FormRef}
    source: handler
    apply_handler: RefAddKeyword
    retract_handler: RefRemoveKeyword
    docs: "Keywords added dynamically to a specific placed reference."

  current_location:
    type: const<FormRef>
    args:
      - {name: R, type: FormRef}
      - {name: LOC, type: FormRef}
    source: handler
    docs: "The location this reference is currently in."

  base_form:
    type: const<FormRef>
    args:
      - {name: R, type: FormRef}
      - {name: F, type: FormRef}
    source: handler
    docs: "Bridge from live reference to its base record."

  in_combat:
    type: predicate
    args: [{name: R, type: FormRef}]
    source: handler
    docs: "True when this reference is currently in combat."
