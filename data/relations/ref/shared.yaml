namespace: ref
# Universal reference relations — apply to any placed reference regardless
# of what its base form is.
#
# All ref/* relations are source: handler — the runtime engine reads them
# on demand via a handler registry. Handler bindings for the Windows
# SKSE extension are provided by the skyrim_compile extension (v3 plan).
relations:
  base_form:
    type: const<FormRef>
    args:
      - {name: R, type: FormRef}
      - {name: F, type: FormRef}
    source: handler
    read_handler: RefReadBaseForm
    docs: "Bridge from a live placed reference to its base record. This is the primary join used to carry a reference over into form/* queries."

  current_location:
    type: const<FormRef>
    args:
      - {name: R, type: FormRef}
      - {name: LOC, type: FormRef}
    source: handler
    read_handler: RefReadCurrentLocation
    docs: "The Location record this reference is currently in (nearest parent Location)."

  keyword:
    type: list<FormRef>
    args:
      - {name: R, type: FormRef}
      - {name: KW, type: FormRef}
    source: handler
    apply_handler: RefAddKeyword
    retract_handler: RefRemoveKeyword
    docs: "Keywords added to a specific reference at runtime (distinct from its base form's keywords)."

  is_player:
    type: predicate
    args: [{name: R, type: FormRef}]
    source: handler
    read_handler: RefReadIsPlayer
    docs: "True when R is the player character."

  is_npc:
    type: predicate
    args: [{name: R, type: FormRef}]
    source: handler
    read_handler: RefReadIsNpc
    docs: "True when R's base form is an NPC (actor base)."

  is_weapon:
    type: predicate
    args: [{name: R, type: FormRef}]
    source: handler
    read_handler: RefReadIsWeapon
    docs: "True when R's base form is a WEAP record."

  is_armor:
    type: predicate
    args: [{name: R, type: FormRef}]
    source: handler
    read_handler: RefReadIsArmor
    docs: "True when R's base form is an ARMO record."
