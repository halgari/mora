namespace: ref
# Actor-reference relations (NPCs and the player).
# Predicates here should generally be gated by ref/is_npc(R) or
# ref/is_player(R) in the rule body — reading actor state from a
# non-actor ref yields no fact.
relations:
  is_dead:
    type: predicate
    args: [{name: R, type: FormRef}]
    source: handler
    read_handler: RefReadIsDead
    docs: "True when R is an actor that is currently dead."

  in_combat:
    type: predicate
    args: [{name: R, type: FormRef}]
    source: handler
    read_handler: RefReadInCombat
    docs: "True when R is an actor currently in combat state."

  health:
    type: const<Float>
    args:
      - {name: R, type: FormRef}
      - {name: H, type: Float}
    source: handler
    read_handler: RefReadHealth
    docs: "Current health value for an actor reference (not max health)."

  magicka:
    type: const<Float>
    args:
      - {name: R, type: FormRef}
      - {name: M, type: Float}
    source: handler
    read_handler: RefReadMagicka
    docs: "Current magicka value for an actor reference."

  stamina:
    type: const<Float>
    args:
      - {name: R, type: FormRef}
      - {name: S, type: Float}
    source: handler
    read_handler: RefReadStamina
    docs: "Current stamina value for an actor reference."

  level:
    type: const<Int>
    args:
      - {name: R, type: FormRef}
      - {name: L, type: Int}
    source: handler
    read_handler: RefReadLevel
    docs: "Current (possibly leveled) level of an actor reference. May differ from form/base_level when the actor was auto-leveled."

  equipped_weapon:
    type: const<FormRef>
    args:
      - {name: ACTOR, type: FormRef}
      - {name: WEAP, type: FormRef}
    source: handler
    read_handler: RefReadEquippedWeapon
    docs: "Weapon currently held in ACTOR's right (main) hand. Returns the base weapon FormID, not a reference."

  equipped_weapon_left:
    type: const<FormRef>
    args:
      - {name: ACTOR, type: FormRef}
      - {name: WEAP, type: FormRef}
    source: handler
    read_handler: RefReadEquippedWeaponLeft
    docs: "Weapon or shield currently held in ACTOR's left (off) hand."

  equipped_spell_left:
    type: const<FormRef>
    args:
      - {name: ACTOR, type: FormRef}
      - {name: SPELL, type: FormRef}
    source: handler
    read_handler: RefReadEquippedSpellLeft
    docs: "Spell currently readied in ACTOR's left hand."

  equipped_spell_right:
    type: const<FormRef>
    args:
      - {name: ACTOR, type: FormRef}
      - {name: SPELL, type: FormRef}
    source: handler
    read_handler: RefReadEquippedSpellRight
    docs: "Spell currently readied in ACTOR's right hand."

  equipped_armor:
    type: list<FormRef>
    args:
      - {name: ACTOR, type: FormRef}
      - {name: ARMO, type: FormRef}
    source: handler
    read_handler: RefReadEquippedArmor
    docs: "Armor pieces currently worn by ACTOR. One fact per equipped piece."

  inventory_item:
    type: list<FormRef>
    args:
      - {name: ACTOR, type: FormRef}
      - {name: ITEM, type: FormRef}
    source: handler
    read_handler: RefReadInventoryItem
    docs: "Items currently in ACTOR's inventory (base-form FormIDs; counts and individual ref instances aren't exposed here)."
