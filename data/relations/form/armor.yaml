namespace: form
# ARMO record (TESObjectARMO).
# DATA subrecord: gold_value(i32@0) weight(f32@4) (polymorphic, see shared.yaml).
# DNAM subrecord: armor_rating(f32@0).
relations:
  armor:
    type: predicate
    args: [{name: F, type: FormRef}]
    source: static
    esp: {record_type: ARMO}
    docs: "True when F is an armor base record."

  armor_rating:
    type: countable<Float>
    args:
      - {name: A, type: FormRef}
      - {name: V, type: Float}
    source: static
    # No extract: — form_model.h already registers armor_rating from
    # ARMO/DNAM@0 as a Float32 PackedField. This entry is declarative for
    # the compiler (type-checker sees it) and for docs generation.
    esp: {record_type: ARMO, subrecord: DNAM}
    docs: "Armor rating. Raw ESP value is the display rating × 100."
