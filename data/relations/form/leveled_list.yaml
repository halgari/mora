namespace: form
# LVLI (Leveled Item) / LVLN (Leveled Character) records.
#
# Existence predicates leveled_list(F) / leveled_char(F) are registered by
# form_model.h from kFormTypes — YAML declares them here for type-checker
# visibility and docs, without an extract: block (so the schema bridge skips
# them, avoiding duplicate registration).
#
# Subrecords:
#   LVLD: one u8, the "chance none" percent.
#   LVLO: repeating, 12 bytes each:
#         i16 level @ 0   — min player level for this entry
#         i16 pad @ 2
#         u32 formid @ 4  — reference to the pool
#         i16 count @ 8
#         i16 pad @ 10
#   LVLF: 1-byte flags (calc-from-all-levels, calc-for-player-level, etc.)
relations:
  leveled_list:
    type: predicate
    args: [{name: F, type: FormRef}]
    source: static
    esp: {record_type: LVLI}
    docs: "True when F is a Leveled Item list (registered via form_model.h)."

  leveled_char:
    type: predicate
    args: [{name: F, type: FormRef}]
    source: static
    esp: {record_type: LVLN}
    docs: "True when F is a Leveled Character list (registered via form_model.h)."

  chance_none:
    type: countable<Int>
    args:
      - {name: LIST, type: FormRef}
      - {name: PCT, type: Int}
    source: static
    esp:
      record_type: LVLI
      subrecord: LVLD
      extract: subrecord
      read_as: uint8
    docs: "Percent chance (0..100) that a leveled list returns nothing."

  leveled_entry:
    type: list<FormRef>
    args:
      - {name: LIST, type: FormRef}
      - {name: ENTRY, type: FormRef}
    source: static
    esp:
      record_type: LVLI
      subrecord: LVLO
      extract: list_field
      offset: 4        # FormID is at byte 4 of each 12-byte LVLO subrecord
      read_as: formid
    docs: "Leveled-item entries — the pool of references the list can produce. (Level and count are not captured yet.)"
