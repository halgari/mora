namespace: form
# NPC_ record (TESNPC). ACBS layout:
#   flags(u32@0) magicka(u16@4) stamina(u16@6) level(u16@8)
#   calcMin(u16@10) calcMax(u16@12) speedMult(u16@14) ...
relations:
  npc:
    type: predicate
    args: [{name: F, type: FormRef}]
    source: static
    esp: {record_type: NPC_}
    docs: "True when F is a base NPC record."

  # ── Scalar stats (ACBS packed fields) ──
  base_level:
    type: countable<Int>
    args:
      - {name: NPC, type: FormRef}
      - {name: L, type: Int}
    source: static
    esp: {record_type: NPC_, subrecord: ACBS}
    docs: "NPC base level."

  calc_level_min:
    type: countable<Int>
    args:
      - {name: NPC, type: FormRef}
      - {name: L, type: Int}
    source: static
    esp:
      record_type: NPC_
      subrecord: ACBS
      extract: packed_field
      offset: 10
      read_as: uint16
    docs: "Minimum auto-calculated level for this NPC."

  calc_level_max:
    type: countable<Int>
    args:
      - {name: NPC, type: FormRef}
      - {name: L, type: Int}
    source: static
    esp:
      record_type: NPC_
      subrecord: ACBS
      extract: packed_field
      offset: 12
      read_as: uint16
    docs: "Maximum auto-calculated level for this NPC (0 = no cap)."

  speed_mult:
    type: countable<Int>
    args:
      - {name: NPC, type: FormRef}
      - {name: N, type: Int}
    source: static
    esp:
      record_type: NPC_
      subrecord: ACBS
      extract: packed_field
      offset: 14
      read_as: uint16
    docs: "NPC movement speed multiplier (100 = normal)."

  # ── Const FormRef lookups ──
  race:
    type: const<FormRef>
    args:
      - {name: NPC, type: FormRef}
      - {name: RACE, type: FormRef}
    source: static
    esp: {record_type: NPC_, subrecord: RNAM}
    docs: "NPC base race."

  npc_class:
    type: const<FormRef>
    args:
      - {name: NPC, type: FormRef}
      - {name: CLASS, type: FormRef}
    source: static
    esp:
      record_type: NPC_
      subrecord: CNAM
      extract: subrecord
      read_as: formid
    docs: "NPC class record (TESClass)."

  voice_type:
    type: const<FormRef>
    args:
      - {name: NPC, type: FormRef}
      - {name: VTYPE, type: FormRef}
    source: static
    esp:
      record_type: NPC_
      subrecord: VTCK
      extract: subrecord
      read_as: formid
    docs: "NPC voice type."

  default_outfit:
    type: const<FormRef>
    args:
      - {name: NPC, type: FormRef}
      - {name: OUTFIT, type: FormRef}
    source: static
    esp:
      record_type: NPC_
      subrecord: DOFT
      extract: subrecord
      read_as: formid
    docs: "NPC default outfit (Outfit record)."

  # ── Flag predicates (bits in the ACBS flags word at offset 0) ──
  female:
    type: predicate
    args: [{name: NPC, type: FormRef}]
    source: static
    esp:
      record_type: NPC_
      subrecord: ACBS
      extract: bit_test
      offset: 0
      read_as: uint32
      bit: 0
    docs: "True when this NPC is female."

  essential:
    type: predicate
    args: [{name: NPC, type: FormRef}]
    source: static
    esp:
      record_type: NPC_
      subrecord: ACBS
      extract: bit_test
      offset: 0
      read_as: uint32
      bit: 1
    docs: "True when this NPC has the Essential flag (cannot be killed)."

  unique:
    type: predicate
    args: [{name: NPC, type: FormRef}]
    source: static
    esp:
      record_type: NPC_
      subrecord: ACBS
      extract: bit_test
      offset: 0
      read_as: uint32
      bit: 5
    docs: "True when this NPC is marked Unique (only one instance can exist)."

  protected:
    type: predicate
    args: [{name: NPC, type: FormRef}]
    source: static
    esp:
      record_type: NPC_
      subrecord: ACBS
      extract: bit_test
      offset: 0
      read_as: uint32
      bit: 11
    docs: "True when this NPC has the Protected flag (killable only by player)."

  # ── Collections (repeating subrecords) ──
  spell:
    type: list<FormRef>
    args:
      - {name: NPC, type: FormRef}
      - {name: SPELL, type: FormRef}
    source: static
    esp:
      record_type: NPC_
      subrecord: SPLO
      extract: list_field
      element_size: 4
      read_as: formid
    docs: "Spells granted to this NPC."

  perk:
    type: list<FormRef>
    args:
      - {name: NPC, type: FormRef}
      - {name: PERK, type: FormRef}
    source: static
    esp:
      record_type: NPC_
      subrecord: PRKR
      extract: list_field
      element_size: 8
      read_as: formid
    docs: "Perks granted to this NPC."

  inventory_item:
    type: list<FormRef>
    args:
      - {name: NPC, type: FormRef}
      - {name: ITEM, type: FormRef}
    source: static
    esp:
      record_type: NPC_
      subrecord: CNTO
      extract: list_field
      element_size: 8
      read_as: formid
    docs: "Items in this NPC's default inventory (CNTO is form+count)."
