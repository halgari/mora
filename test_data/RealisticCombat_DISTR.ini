; Realistic Combat Overhaul - SPID distributions
; Gives combat perks and spells to NPCs based on their class/faction

; All bandits get a basic combat perk
Perk = CombatTraining|NONE|BanditFaction

; Mages in the College get destruction spells
Spell = FireBolt|NONE|CollegeofWinterholdFaction|NONE|NONE|NONE|75
Spell = IceSpike|NONE|CollegeofWinterholdFaction|25/|NONE|NONE|50

; Vampires get night vision and drain life
Spell = VampireNightVision|ActorTypeVampire
Spell = VampireDrainLife|ActorTypeVampire|NONE|10/

; Guards get defensive perks based on level
Perk = ShieldWall|NONE|GuardFaction|15/
Perk = BlockRunner|NONE|GuardFaction|25/

; Forsworn get keywords for AI behavior
Keyword = ActorTypeAggressive|NONE|ForswornFaction
Keyword = ActorTypeWilderness|NONE|ForswornFaction

; High-level unique NPCs get boss perks
Perk = BossToughness|NONE|NONE|40/|U
Perk = BossRegeneration|NONE|NONE|40/|U|NONE|50

; Give gold to merchants
Item = 0xF~Skyrim.esm|NONE|JobMerchantFaction|NONE|NONE|1000
