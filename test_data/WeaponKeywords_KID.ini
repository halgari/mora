; Weapon & Armor Keyword Standardization
; Adds missing keywords for crafting/tempering compatibility

; Silver weapons
Keyword = WeapMaterialSilver|Weapon|*SilverSword
Keyword = WeapMaterialSilver|Weapon|*SilverGreatsword

; Daedric weapons should have daedric keyword
Keyword = WeapMaterialDaedric|Weapon|*Daedric,-WeapMaterialDaedric

; Heavy armor classification
Keyword = ArmorHeavy|Armor|*IronArmor,-ArmorHeavy
Keyword = ArmorHeavy|Armor|*SteelArmor,-ArmorHeavy
Keyword = ArmorHeavy|Armor|*DwarvenArmor,-ArmorHeavy

; Light armor classification
Keyword = ArmorLight|Armor|*LeatherArmor,-ArmorLight
Keyword = ArmorLight|Armor|*HideArmor,-ArmorLight
Keyword = ArmorLight|Armor|*ElvenArmor,-ArmorLight

; Vendor keywords for economy mods
Keyword = VendorItemWeapon|Weapon|NONE
Keyword = VendorItemArmor|Armor|NONE
