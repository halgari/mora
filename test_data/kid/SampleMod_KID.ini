; SampleMod_KID.ini — representative KID rules used as a reference
; fixture for Mora's KID integration. Covers the common line shapes
; and is stable enough to exercise the parser + resolver against the
; real Skyrim.esm EditorID set.
;
; Lines here use vanilla Skyrim keywords / item editor IDs so they
; resolve against any Skyrim.esm. Comments that start with ';' are
; dropped by the parser.

; 1. No-filter variant: attach a keyword to all weapons.
VendorItemWeapon|Weapon|NONE|NONE|100

; 2. Filter by one item keyword (OR over the filter column, which here
;    has exactly one value).
WeapMaterialIron|Weapon|WeapMaterialIron|NONE|100

; 3. Multiple filter values — OR semantics across the comma.
MagicSchoolDestruction|Spell|MagicDamageFire,MagicDamageFrost,MagicDamageShock|NONE|100

; 4. AND-of-ORs via '+' within a group. v1 flattens the AND to OR
;    (narrower filter than KID's original intent but no false positives).
ArmorHeavy|Armor|ArmorMaterialIron+ArmorGauntlet,ArmorMaterialSteel+ArmorGauntlet|NONE|100

; 5. Section header — allowed by KID and ignored by the parser.
[Keywords]

; 6. A line with all fields including trait + chance (both are parsed
;    but only E / -E traits are wired in v1; chance < 100 is warned).
VendorItemPotion|Potion|NONE|E|100

; 7. 50% chance — produces a 'kid-chance-ignored' warning and applies
;    the keyword unconditionally at compile time.
ArmorClothing|Armor|NONE|NONE|50

; 8. Talking activator (requires the form/talking_activator predicate
;    added as part of the KID integration branch).
VendorItemClutter|TalkingActivator|NONE|NONE|100

; 9. MagicEffect with space in the type token, no filter.
MagicDisallowEnchanting|Magic Effect|NONE|NONE|100

; 10. Malformed line for diagnostic coverage (missing item type).
BadLine
