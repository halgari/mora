####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
# Qodana's C/C++ linter ships under the -eap tag; the stable `2025.3`
# tag doesn't exist on Docker Hub yet. Use `image:` (not `linter:`)
# because this is a full image reference, not one of Qodana's short
# well-known linter IDs.
image: jetbrains/qodana-clang:2025.3-eap
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses