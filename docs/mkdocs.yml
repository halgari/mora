site_name: Mora
site_description: Declarative patching language for Skyrim SE
site_url: https://halgari.github.io/mora/
repo_url: https://github.com/halgari/mora
repo_name: halgari/mora

docs_dir: src

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font: false
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - js/extra.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - How Mora Works: how-mora-works.md
  - Language Guide: language-guide.md
  - Language Reference: language-reference.md
  - Relation Reference: relations.md
  - CLI Reference: cli-reference.md
  - Examples: examples.md
